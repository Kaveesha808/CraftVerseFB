name: 3x Daily 5-Min Crafts FB Reels Automation

on:
  schedule:
    # Runs 3 times every day: at 04:00, 12:00, and 20:00 UTC (9:30 AM, 5:30 PM, 1:30 AM Sri Lanka Time)
    - cron: '0 4,12,20 * * *'
  workflow_dispatch:
    # Allows clicking "Run workflow" manually in GitHub Actions tab anytime!

jobs:
  generate_and_upload_reel:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn requests pydantic aiofiles

      - name: Run Standalone AI Reels Generator & FB Upload
        env:
          STREAM_URL: "https://soul-5mincrafteng-rakuten.amagi.tv/playlist.m3u8"
          CLIP_DURATION: "45"
          HEADER_TEXT: "🔥 CRAZY 5-MIN DIY HACK 💡"
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: "llama-3.3-70b-versatile"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python standalone_job.py

      - name: Save Generated Reel as Downloadable Backup (Artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-craft-reel-${{ github.run_id }}
          path: |
            backend/media/reels/*.mp4
            backend/media/thumbnails/*.jpg
          retention-days: 90
